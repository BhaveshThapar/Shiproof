name: Publish

# Publishes the npm packages and cuts a GitHub Release when a v* tag is pushed.
# Requires repo secret NPM_TOKEN (an npm automation token with publish rights to
# the @aerodeploy scope). The composite Action is consumed via the git tag/Release
# itself — it is not published to npm.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: npm test
      # Publish the engine first so the CLI's exact dependency resolves on the registry.
      - run: npm publish -w @aerodeploy/preflight-engine
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm publish -w @aerodeploy/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
